<div id="remote-library-client-root" class="space-y-5">
  <section class="rounded-lg border border-gray-800 bg-dark-900/60 p-4">
    <div class="flex flex-col gap-3 md:flex-row md:items-start md:justify-between">
      <div>
        <h2 class="text-lg font-semibold text-white">Remote Library Client</h2>
        <p class="mt-1 text-sm text-gray-400">Add a direct server URL, then choose it from the Library source selector.</p>
      </div>
      <button class="rounded-lg bg-dark-700 px-3 py-2 text-sm text-gray-200 hover:bg-dark-600" data-rlc-refresh>Refresh</button>
    </div>
  </section>

  <section class="grid gap-4 lg:grid-cols-[minmax(0,0.8fr)_minmax(0,1fr)]">
    <div class="rounded-lg border border-gray-800 bg-dark-900/60 p-4">
      <h3 class="text-base font-semibold text-white">Add Source</h3>
      <div class="mt-3 space-y-3">
        <label class="space-y-1 text-sm text-gray-300">
          <span class="block text-xs uppercase text-gray-500">Server URL</span>
          <input id="rlc-base-url" type="url" class="w-full rounded-lg border border-gray-800 bg-dark-950 px-3 py-2 text-gray-100" placeholder="http://127.0.0.1:8765" />
        </label>
        <label class="space-y-1 text-sm text-gray-300">
          <span class="block text-xs uppercase text-gray-500">Label</span>
          <input id="rlc-label" type="text" class="w-full rounded-lg border border-gray-800 bg-dark-950 px-3 py-2 text-gray-100" placeholder="Studio laptop" />
        </label>
        <button class="rounded-lg bg-accent px-3 py-2 text-sm font-semibold text-white hover:bg-accent-light" data-rlc-add>Add Source</button>
      </div>
      <div id="remote-library-client-message" class="mt-3 text-sm text-gray-400"></div>
    </div>

    <div class="rounded-lg border border-gray-800 bg-dark-900/60 p-4">
      <h3 class="text-base font-semibold text-white">Sources</h3>
      <div id="remote-library-client-sources" class="mt-3 space-y-2"></div>
    </div>
  </section>
</div>
